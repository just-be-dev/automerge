[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.test]
run = "bun test"

[tasks.typecheck]
run = "tsgo --build"

[tasks.build]
run = "bun build"

[tasks.app]
run = "bun run --cwd apps/{{arg(name=\"app\")}} dev"
description = "Run an app in dev mode"

